<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Azure QuickTask</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow-sm">
        <div class="card-body">
            <h2 class="card-title text-center mb-4">☁️ Azure QuickTask</h2>
            
            <div class="input-group mb-3">
                <input type="text" id="taskInput" class="form-control" placeholder="Enter a new task">
                <button class="btn btn-primary" onclick="addTask()">Add</button>
            </div>

            <ul id="taskList" class="list-group"></ul>
        </div>
    </div>
</div>

<script>
function loadTasks() {
    fetch("/tasks")
        .then(res => res.json())
        .then(data => {
            const list = document.getElementById("taskList");
            list.innerHTML = "";
            data.forEach(task => {
                list.innerHTML += `
                    <li class="list-group-item d-flex justify-content-between align-items-center">
                        ${task[1]}
                        <button class="btn btn-sm btn-danger" onclick="deleteTask(${task[0]})">Delete</button>
                    </li>
                `;
            });
        });
}

function addTask() {
    const task = document.getElementById("taskInput").value.trim();
    if (!task) return alert("Please enter a task!");
    
    fetch("/add", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ task: task })
    }).then(() => {
        document.getElementById("taskInput").value = "";
        loadTasks();
    });
}

function deleteTask(id) {
    fetch("/delete/" + id, { method: "DELETE" })
        .then(() => loadTasks());
}

loadTasks();
</script>

</body>
</html>
